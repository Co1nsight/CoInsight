spring.application.name=coanalysis

# H2 Database Configuration (파일 모드 - 영구 저장)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.datasource.url=jdbc:h2:file:./data/coanalysis;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SQL Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Open in View Configuration
spring.jpa.open-in-view=false

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,loggers,env,beans,configprops
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Virtual Thread Configuration
spring.threads.virtual.enabled=true

# SpringDoc Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.url=/coinsight/v3/api-docs
springdoc.api-docs.path=/v3/api-docs

# HuggingFace Configuration
huggingface.api.token=${HUGGINGFACE_API_TOKEN:}
huggingface.api.model=snunlp/KR-FinBert-SC
huggingface.api.model.english=ProsusAI/finbert
huggingface.api.base-url=https://router.huggingface.co/hf-inference/models

# Bithumb Configuration
bithumb.api.base-url=https://api.bithumb.com
bithumb.api.access-key=${BITHUMB_ACCESS_KEY:}
bithumb.api.secret-key=${BITHUMB_SECRET_KEY:}

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=60s,maximumSize=1000

# CryptoCompare Configuration (English news)
cryptocompare.api.base-url=https://min-api.cryptocompare.com
cryptocompare.api.max-retries=3

# TokenPost Configuration (Korean news)
tokenpost.rss.url=https://www.tokenpost.kr/rss
tokenpost.rss.max-retries=3

# DigitalToday Configuration (Korean news)
digitaltoday.rss.url=https://www.digitaltoday.co.kr/rss/allArticle.xml
digitaltoday.rss.max-retries=3